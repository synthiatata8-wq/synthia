<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion | SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:22px 28px;
z-index:10;
}

.logo{
letter-spacing:6px;
}

/* PAGE */
.page{
padding:120px 40px 60px;
}

h1{
letter-spacing:6px;
margin-bottom:40px;
font-weight:300;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
padding:15px;
border-radius:8px;
}

img{
width:100%;
border-radius:6px;
margin-bottom:10px;
}

.card h3{
font-size:14px;
letter-spacing:2px;
}

.card p{
font-size:12px;
opacity:0.7;
margin-top:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div>☰</div>
<div class="logo">SYNTHIA</div>
<div>⌕</div>
</header>

<!-- CONTENT -->
<div class="page">

<h1>FASHION DIVISION</h1>

<div class="grid">

<!-- VOGUE COVER -->
<div class="card">
<img src="jacob-elordi-vogue.jpg" alt="Vogue Cover">
<h3>VOGUE — JACOB ELORDI</h3>
<p>Editorial cover exploration blending cinematic fashion and contemporary portraiture.</p>
</div>

<!-- CHANEL CAMPAIGN -->
<div class="card">
<img src="chanel-de-bleu.jpg" alt="Chanel Campaign">
<h3>CHANEL DE BLEU — YUTARO GOTO</h3>
<p>Luxury fragrance campaign focused on identity, scent, and visual abstraction.</p>
</div>

</div>

</div>

</body>
</html>
