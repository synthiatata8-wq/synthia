<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion | SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:22px 28px;
z-index:10;
}

.menu,.search{
font-size:18px;
cursor:pointer;
opacity:0.75;
transition:0.3s;
}

.menu:hover,.search:hover{
opacity:1;
transform:scale(1.05);
}

.logo{
letter-spacing:6px;
font-size:14px;
opacity:0.9;
}

/* PAGE */
.page{
padding:120px 50px 60px;
}

h1{
letter-spacing:8px;
font-weight:300;
font-size:18px;
margin-bottom:50px;
opacity:0.85;
}

/* FEATURED */
.featured{
margin-bottom:50px;
}

.featured img{
width:100%;
border-radius:10px;
}

.featured h2{
margin-top:15px;
font-size:16px;
letter-spacing:3px;
}

.featured p{
font-size:12px;
opacity:0.7;
margin-top:6px;
max-width:600px;
line-height:1.5;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
padding:12px;
border-radius:8px;
}

.card img{
width:100%;
border-radius:6px;
margin-bottom:10px;
}

.card h3{
font-size:13px;
letter-spacing:2px;
}

.card p{
font-size:11px;
opacity:0.7;
margin-top:5px;
}
</style>
</head>

<body>

<header>
<div class="menu">☰</div>
<div class="logo">SYNTHIA</div>
<div class="search">⌕</div>
</header>

<div class="page">

<h1>FASHION</h1>

<div class="featured">
<img src="jacob-elordi-vogue.jpg" alt="Vogue Cover">
<h2>VOGUE — JACOB ELORDI</h2>
<p>
A cinematic editorial cover exploring controlled minimalism, identity framing, and contemporary fashion portraiture.
</p>
</div>

<div class="grid">

<div class="card">
<img src="chanel-de-bleu.jpg" alt="Chanel Campaign">
<h3>CHANEL DE BLEU — YUTARO GOTO</h3>
<p>Luxury fragrance campaign built around identity, scent, and abstraction.</p>
</div>

</div>

</div>

</body>
</html>
