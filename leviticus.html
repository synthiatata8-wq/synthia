<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leviticus | SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
background:#000;
padding:20px 30px;
z-index:10;
}

.nav a{
color:#fff;
text-decoration:none;
font-size:14px;
letter-spacing:2px;
}

/* LAYOUT */
.page{
padding:90px 40px 60px;
}

/* TRAILER */
.trailer{
position:relative;
width:100%;
aspect-ratio:16/9;
margin-bottom:40px;
}

.trailer iframe{
width:100%;
height:100%;
border:0;
border-radius:8px;
}

/* TITLE */
h1{
letter-spacing:6px;
font-weight:300;
margin-bottom:30px;
}

/* POSTERS */
.posters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.posters img{
width:100%;
border-radius:8px;
}

/* REVIEWS */
.reviews{
opacity:0.8;
line-height:1.6;
font-size:13px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a href="film.html">← Back to Film</a>
</div>

<div class="page">

<h1>LEVITICUS</h1>

<!-- TRAILER -->
<div class="trailer">
<iframe 
src="https://www.youtube.com/embed/WXuK0vlFxII" 
allowfullscreen>
</iframe>
</div>

<!-- POSTERS -->
<div class="posters">
<img src="leviticus-poster-1.png" alt="Poster 1">
<img src="leviticus-poster-2.png" alt="Poster 2">
</div>

<!-- REVIEWS -->
<div class="reviews">
“The film delivers a striking visual identity with restrained emotional intensity.” — The Guardian<br><br>
“A bold and atmospheric piece of contemporary visual storytelling.” — Variety
</div>

</div>

</body>
</html>
