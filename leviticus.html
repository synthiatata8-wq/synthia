<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leviticus | Synthia</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: "Helvetica Neue", Arial, sans-serif;
  overflow-x: hidden;
}

/* BACK */
.back {
  position: fixed;
  top: 20px;
  left: 30px;
  color: white;
  text-decoration: none;
  font-size: 14px;
  z-index: 10;
  opacity: 0.7;
}

/* POSTERS */
.section {
  margin-bottom: 100px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.2s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.poster {
  width: 100%;
  display: block;
}

/* TEXT */
.info {
  padding: 80px 12%;
  text-align: center;
}

.info p {
  max-width: 700px;
  margin: auto;
  font-size: 18px;
  line-height: 1.8;
  opacity: 0.85;
}

/* FILM GRAIN OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.05;
  pointer-events: none;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Home</a>

<!-- POSTER 1 -->
<div class="section">
  <img src="leviticus-poster-1.png" class="poster">
</div>

<!-- TEXT -->
<div class="info">
  <p>
    A queer horror film exploring identity, repression, and faith collapsing into fear.
  </p>
</div>

<!-- POSTER 2 -->
<div class="section">
  <img src="leviticus-poster-2.png" class="poster">
</div>

<script>
// fade-in on scroll
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.2
});

sections.forEach(sec => observer.observe(sec));
</script>

</body>
</html>
