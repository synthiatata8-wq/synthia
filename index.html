<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
color:#f5f5f5;
}

header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:#0b0b0b;
z-index:100;
}

.menu,.search{
font-size:18px;
cursor:pointer;
opacity:0.8;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:14px;
}

.topics{
margin-top:80px;
display:flex;
overflow-x:auto;
gap:25px;
padding:15px 30px;
white-space:nowrap;
}

.topics a{
text-decoration:none;
color:#fff;
font-size:12px;
opacity:0.7;
letter-spacing:2px;
}

.spacer{
height:40px;
}

/* FEATURED CARD */
.featured{
padding:0 30px;
max-width:900px;
margin:auto;
}

.featured a{
display:block;
text-decoration:none;
color:inherit;
}

.featured img{
width:100%;
border-radius:8px;
display:block;
margin-bottom:15px;
}

.desc{
font-size:13px;
opacity:0.85;
line-height:1.6;
}

/* MENU */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:200;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.overlay a{
color:#fff;
text-decoration:none;
font-size:20px;
margin:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:20px;
cursor:pointer;
}

/* SEARCH */
.search-bar{
position:fixed;
top:70px;
right:30px;
background:#111;
padding:10px;
border-radius:6px;
display:none;
}

.search-bar input{
background:none;
border:none;
outline:none;
color:#fff;
}
</style>
</head>

<body>

<header>
<div class="menu">☰</div>
<div class="logo">SYNTHIA</div>
<div class="search">⌕</div>
</header>

<div class="topics">
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">VISUAL</a>
<a href="#">ARCHIVE</a>
</div>

<div class="spacer"></div>

<div class="featured">

<a href="leviticus.html">

<img src="leviticus-cover.jpg" alt="Leviticus">

<div class="desc">
Stacey Clausen and Joe Bird appear in a post-press moment from the Leviticus cycle, captured shortly after their Variety session,
</div>

</a>

</div>

</body>
</html>
