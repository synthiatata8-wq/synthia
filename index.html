<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Helvetica, Arial, sans-serif;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
border-bottom:1px solid #222;
position:relative;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:13px;
opacity:0.85;
}

/* ICONS */
.icon{
font-size:18px;
cursor:pointer;
opacity:0.8;
}

/* MENU */
.menu{
position:fixed;
top:0;
left:-100%;
width:80%;
height:100%;
background:#0b0b0b;
padding:40px 20px;
transition:0.4s;
z-index:999;
border-right:1px solid #222;
}

.menu.active{
left:0;
}

.menu a{
display:block;
margin:20px 0;
color:#fff;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
}

/* SEARCH */
.search-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0b0b;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:1000;
}

.search-overlay input{
width:80%;
padding:15px;
font-size:16px;
background:none;
border:1px solid #333;
color:#fff;
outline:none;
}

/* SUBTOPICS */
.subtopics{
display:flex;
overflow-x:auto;
gap:15px;
padding:15px 20px;
border-bottom:1px solid #222;
font-size:12px;
opacity:0.8;
}

.subtopics div{
white-space:nowrap;
}

/* HERO */
.hero{
padding:20px;
}

.hero img{
width:100%;
border-radius:4px;
}

.hero p{
font-family:Georgia, serif;
font-size:14px;
margin-top:15px;
opacity:0.9;
}

.readmore{
display:inline-block;
margin-top:10px;
font-size:12px;
letter-spacing:1px;
opacity:0.8;
}
</style>
</head>

<body>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");

if(e.target === this){
this.style.display="none";
}
});
