<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
-webkit-font-smoothing:antialiased;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:#0b0b0b;
z-index:1000;
box-sizing:border-box;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:10px;
font-size:13px;
font-weight:300;
}

.icon{
cursor:pointer;
display:flex;
align-items:center;
}

/* SUBTOPICS */
.subnav{
margin-top:70px;
display:flex;
gap:22px;
padding:12px 20px;
overflow-x:auto;
white-space:nowrap;
scrollbar-width:none;
}

.subnav::-webkit-scrollbar{display:none;}

.subnav a{
color:#fff;
text-decoration:none;
font-size:11px;
letter-spacing:1.5px;
text-transform:uppercase;
opacity:0.75;
flex-shrink:0;
}

/* HERO */
.press{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.press img{
width:100%;
border-radius:6px;
}

.press p{
font-family:Georgia, serif;
font-size:14px;
line-height:1.7;
opacity:0.85;
}

/* CTA */
.cta{
max-width:900px;
margin:20px auto 60px;
padding:0 20px;
}

.cta a{
font-family:Georgia, serif;
font-size:20px;
color:#fff;
text-decoration:none;
}

/* MENU */
.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
}

.menu a{
color:#fff;
text-decoration:none;
margin:10px;
font-size:15px;
letter-spacing:2px;
}

/* SOCIAL ICONS */
.social{
margin-top:40px;
display:flex;
gap:18px;
justify-content:center;
}

.social a svg{
width:18px;
height:18px;
fill:white;
}

/* SEARCH */
.search{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
padding-top:120px;
align-items:center;
z-index:2000;
}

.search input{
width:80%;
padding:14px;
border:none;
border-bottom:1px solid #444;
background:transparent;
color:#fff;
outline:none;
}

.result{
width:80%;
padding:12px 0;
border-bottom:1px solid #222;
cursor:pointer;
font-size:14px;
}
</style>
</head>

<body>

<header>
<div onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>

<div onclick="openSearch()">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
<circle cx="11" cy="11" r="7"></circle>
<line x1="16" y1="16" x2="21" y2="21"></line>
</svg>
</div>
</header>

<!-- SUBTOPICS -->
<div class="subnav">
<a>FILM</a><a>FASHION</a><a>CULTURE</a><a>EVENTS</a><a>CELEBRITY</a>
<a>CAMPAIGNS</a><a>BEAUTY</a><a>FRAGRANCE</a><a>RUNWAY</a><a>EDITORIALS</a>
</div>

<!-- HERO -->
<div class="press">
<img src="leviticus-cover.jpg">
<p>Stacey Clausen and Joe Bird during a press tour photoshoot for Leviticus.</p>
</div>

<div class="cta">
<a href="leviticus.html">Continue Reading →</a>
</div>

<!-- MENU -->
<div class="menu" id="menu">
<a href="#">FILM</a>
<a href="#">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">EVENTS</a>
<a href="#">CELEBRITY</a>
<a href="#">CAMPAIGNS</a>
<a href="#">BEAUTY</a>
<a href="#">FRAGRANCE</a>
<a href="#">RUNWAY</a>
<a href="#">EDITORIALS</a>

<!-- SOCIAL ICONS -->
<div class="social">
<a href="https://www.instagram.com/tatasynthia?igsh=YmFhZTNiMGZha3Bn"></a>
<a href="https://x.com/SynthiaTata"></a>
<a href="https://www.facebook.com/profile.php?id=61584934509127"></a>
<a href="https://www.tiktok.com/@synthia_tata?_r=1&_t=ZS-95fRfm6xQ1Y"></a>
<a href="mailto:synthiatata8@gmail.com"></a>
</div>

<br>
<a onclick="closeMenu()">CLOSE</a>
</div>

<!-- SEARCH -->
<div class="search" id="search">
<input id="searchInput" onkeyup="search()" placeholder="Search SYNTHIA...">
<div id="results"></div>
</div>

<script>
function openMenu(){document.getElementById("menu").style.display="flex";}
function closeMenu(){document.getElementById("menu").style.display="none";}
function openSearch(){document.getElementById("search").style.display="flex";}
function closeSearch(){document.getElementById("search").style.display="none";}

const data=[
{title:"Leviticus",link:"leviticus.html"},
{title:"Fashion Campaigns",link:"#"}
];

function search(){
let v=document.getElementById("searchInput").value.toLowerCase();
let r=document.getElementById("results");
r.innerHTML="";
data.forEach(i=>{
if(i.title.toLowerCase().includes(v)){
let d=document.createElement("div");
d.className="result";
d.innerText=i.title;
d.onclick=()=>location=i.link;
r.appendChild(d);
}
});
}
</script>

</body>
</html>
