<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
color:#f5f5f5;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
z-index:100;
}

.menu,.search{
font-size:18px;
cursor:pointer;
opacity:0.7;
transition:0.3s;
}

.menu:hover,.search:hover{
opacity:1;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:14px;
}

/* COVER STORY */
.cover{
height:100vh;
background:url("leviticus-poster-1.png") center/cover no-repeat;
display:flex;
align-items:flex-end;
padding:40px;
position:relative;
text-decoration:none;
color:#fff;
}

/* DARK OVERLAY */
.cover::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* TEXT */
.cover-text{
position:relative;
z-index:2;
max-width:500px;
}

.tag{
font-size:12px;
letter-spacing:3px;
opacity:0.7;
margin-bottom:10px;
}

.title{
font-size:28px;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
opacity:0.85;
line-height:1.6;
}

/* SCROLLABLE TOPICS */
.topics{
position:absolute;
bottom:0;
left:0;
width:100%;
overflow-x:auto;
display:flex;
gap:30px;
padding:15px 30px;
background:rgba(0,0,0,0.6);
z-index:3;
}

.topics a{
white-space:nowrap;
text-decoration:none;
color:#fff;
font-size:12px;
letter-spacing:2px;
opacity:0.7;
}

.topics a:hover{
opacity:1;
}

/* MENU OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:200;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.overlay a{
color:#fff;
text-decoration:none;
font-size:20px;
margin:15px 0;
letter-spacing:3px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:20px;
cursor:pointer;
}

/* SEARCH */
.search-bar{
position:fixed;
top:70px;
right:30px;
background:#111;
padding:10px;
border-radius:6px;
display:none;
}

.search-bar input{
background:none;
border:none;
outline:none;
color:#fff;
font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="menu" onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>
<div class="search" onclick="toggleSearch()">⌕</div>
</header>

<!-- COVER STORY -->
<a href="leviticus.html" class="cover">

<div class="cover-text">
<div class="tag">FILM</div>
<div class="title">LEVITICUS</div>
<div class="subtitle">
A queer horror about desire, identity, and confrontation — where what you fear most becomes what you want.
</div>
</div>

<!-- TOPICS -->
<div class="topics">
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">VISUAL</a>
<a href="#">ARCHIVE</a>
</div>

</a>

<!-- MENU -->
<div class="overlay" id="menu">
<div class="close" onclick="closeMenu()">✕</div>
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">TEAM</a>
</div>

<!-- SEARCH -->
<div class="search-bar" id="searchBar">
<input type="text" placeholder="Search...">
</div>

<script>
function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

function toggleSearch(){
var bar = document.getElementById("searchBar");
if(bar.style.display === "block"){
bar.style.display = "none";
}else{
bar.style.display = "block";
}
}
</script>

</body>
</html>
