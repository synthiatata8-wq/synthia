<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Helvetica Neue", Arial, sans-serif;
}

/* TOP BAR */
.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 40px;
}

.logo {
  text-align: center;
  letter-spacing: 6px;
  font-weight: 300;
  font-family: "Playfair Display", serif;
}

.menu, .search {
  cursor: pointer;
  font-size: 20px;
}

.menu { justify-self: start; }
.search { justify-self: end; }

/* HERO */
.hero {
  height: 75vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
}

.hero p {
  opacity: 0.75;
  max-width: 420px;
  line-height: 1.6;
}

.hero a {
  margin-top: 20px;
  color: white;
  text-decoration: none;
  opacity: 0.85;
}

/* EDITORIAL GRID (UPGRADED) */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  padding: 80px 10%;
}

.card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  transition: transform 0.6s ease;
  filter: grayscale(20%) contrast(1.1);
}

.card:hover img {
  transform: scale(1.08);
}

.card h2 {
  font-family: "Playfair Display", serif;
  font-weight: 300;
  margin: 12px 0 5px;
}

.card p {
  opacity: 0.7;
  margin: 0;
}

/* PANELS */
.menu-panel,
.search-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.menu-panel.active,
.search-panel.active {
  display: flex;
}

.menu-panel a {
  color: white;
  text-decoration: none;
  font-size: 24px;
  margin: 10px;
}

/* SEARCH */
.search-panel input {
  width: 80%;
  padding: 15px;
  font-size: 18px;
  background: black;
  border: 1px solid #333;
  color: white;
}

.results {
  margin-top: 20px;
}

/* GLOW */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 60%),
              radial-gradient(circle at bottom, rgba(232,66,122,0.08), transparent 60%);
  pointer-events: none;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="logo">SYNTHIA</div>
  <div class="search" onclick="toggleSearch()">⌕</div>
</header>

<section class="hero">
  <p>Film • Fashion • Aesthetic Archive</p>
  <a href="leviticus.html">Explore Leviticus →</a>
</section>

<!-- EDITORIAL CARDS -->
<section class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="">
    <h2>Editorial</h2>
    <p>Fashion-inspired visual storytelling.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="">
    <h2>Film Archive</h2>
    <p>Cinematic moods and references.</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1526481280695-3c687fd5432c" alt="">
    <h2>Visual Studies</h2>
    <p>Color, texture and composition.</p>
  </div>

</section>

<!-- MENU -->
<div class="menu-panel" id="menuPanel">
  <a href="#" onclick="toggleMenu()">Close ✕</a>
  <a href="index.html">Home</a>
  <a href="leviticus.html">Leviticus</a>
</div>

<!-- SEARCH -->
<div class="search-panel" id="searchPanel">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchSite()">
  <div class="results" id="results"></div>
  <p onclick="toggleSearch()" style="cursor:pointer;">Close ✕</p>
</div>

<script>
function toggleMenu() {
  document.getElementById("menuPanel").classList.toggle("active");
}

function toggleSearch() {
  document.getElementById("searchPanel").classList.toggle("active");
}

function searchSite() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const results = document.getElementById("results");

  const pages = ["Home", "Leviticus", "Editorial", "Film Archive", "Visual Studies"];

  const filtered = pages.filter(item =>
    item.toLowerCase().includes(input)
  );

  results.innerHTML = filtered.length
    ? filtered.map(item => `<p>${item}</p>`).join("")
    : "<p style='opacity:0.5'>No results</p>";
}
</script>

</body>
</html>
