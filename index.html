<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthia</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: "Helvetica Neue", Arial, sans-serif;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 40px;
  z-index: 10;
}

.menu, .search {
  cursor: pointer;
  font-size: 20px;
}

.menu { justify-self: start; }
.search { justify-self: end; }

.logo {
  text-align: center;
  letter-spacing: 4px;
  font-weight: 300;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: clamp(3rem, 8vw, 7rem);
  letter-spacing: 10px;
  font-weight: 300;
  margin: 0;
}

.hero p {
  margin-top: 20px;
  opacity: 0.7;
  letter-spacing: 2px;
}

/* LINKS */
.links {
  margin-top: 40px;
  display: flex;
  gap: 30px;
}

.links a {
  color: white;
  text-decoration: none;
  opacity: 0.8;
}

/* PANELS */
.panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
}

.panel a {
  color: white;
  font-size: 22px;
  margin: 10px;
  text-decoration: none;
}

/* SEARCH */
.search-box {
  width: 80%;
  padding: 15px;
  font-size: 18px;
  background: black;
  border: 1px solid #333;
  color: white;
}

.results {
  margin-top: 20px;
  text-align: center;
}

/* GLOW */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 60%),
              radial-gradient(circle at bottom, rgba(232,66,122,0.08), transparent 60%);
  pointer-events: none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="logo">SYNTHIA</div>
  <div class="search" onclick="toggleSearch()">⌕</div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>SYNTHIA</h1>
  <p>Film • Fashion • Aesthetic Archive</p>

  <div class="links">
    <a href="film.html">Film</a>
    <a href="editorial.html">Editorial</a>
    <a href="visual.html">Visual</a>
    <a href="leviticus.html">Leviticus</a>
  </div>
</section>

<!-- MENU -->
<div class="panel" id="menuPanel">
  <a href="#" onclick="toggleMenu()">Close ✕</a>
  <a href="index.html">Home</a>
</div>

<!-- SEARCH -->
<div class="panel" id="searchPanel">
  <input class="search-box" type="text" placeholder="Search..." onkeyup="searchSite()" id="searchInput">
  <div class="results" id="results"></div>
  <p onclick="toggleSearch()" style="cursor:pointer; opacity:0.7;">Close ✕</p>
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById("menuPanel");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function toggleSearch() {
  const search = document.getElementById("searchPanel");
  search.style.display = search.style.display === "flex" ? "none" : "flex";
}

function searchSite() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const results = document.getElementById("results");

  const pages = ["Home", "Film", "Editorial", "Visual", "Leviticus"];

  const filtered = pages.filter(item =>
    item.toLowerCase().includes(input)
  );

  results.innerHTML = filtered.length
    ? filtered.map(item => `<p>${item}</p>`).join("")
    : "<p style='opacity:0.5'>No results</p>";
}
</script>

</body>
</html>
