<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
color:#f5f5f5;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
z-index:100;
background:#0b0b0b;
}

.menu,.search{
font-size:18px;
cursor:pointer;
opacity:0.7;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:14px;
}

/* TOPICS */
.topics{
margin-top:80px;
display:flex;
overflow-x:auto;
gap:25px;
padding:15px 30px;
white-space:nowrap;
}

.topics a{
text-decoration:none;
color:#fff;
font-size:12px;
opacity:0.7;
letter-spacing:2px;
}

/* SPACING */
.spacer{
height:40px;
}

/* FEATURED STORY */
.featured{
padding:0 30px;
max-width:900px;
margin:auto;
}

.featured a{
text-decoration:none;
color:inherit;
display:block;
}

.featured img{
width:100%;
border-radius:8px;
margin-bottom:15px;
}

.meta{
font-size:12px;
letter-spacing:2px;
opacity:0.7;
margin-bottom:6px;
}

.title{
font-size:20px;
letter-spacing:3px;
margin-bottom:10px;
}

.desc{
font-size:13px;
line-height:1.6;
opacity:0.85;
}

/* MENU */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:200;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.overlay a{
color:#fff;
text-decoration:none;
font-size:20px;
margin:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:20px;
cursor:pointer;
}

/* SEARCH */
.search-bar{
position:fixed;
top:70px;
right:30px;
background:#111;
padding:10px;
display:none;
border-radius:6px;
}

.search-bar input{
background:none;
border:none;
outline:none;
color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="menu" onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>
<div class="search" onclick="toggleSearch()">⌕</div>
</header>

<!-- TOPICS -->
<div class="topics">
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">VISUAL</a>
<a href="#">ARCHIVE</a>
</div>

<div class="spacer"></div>

<!-- FEATURED STORY -->
<div class="featured">

<a href="leviticus.html">

<img src="leviticus-cover.jpg" alt="Leviticus Cover">

<div class="meta">FILM</div>

<div class="title">LEVITICUS</div>

<div class="desc">
A queer horror film about desire and identity, where two young men confront a creature that takes the form of what they fear — and want — most.
</div>

</a>

</div>

<!-- MENU -->
<div class="overlay" id="menu">
<div class="close" onclick="closeMenu()">✕</div>
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">TEAM</a>
</div>

<!-- SEARCH -->
<div class="search-bar" id="searchBar">
<input type="text" placeholder="Search...">
</div>

<script>
function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

function toggleSearch(){
var bar = document.getElementById("searchBar");
bar.style.display = (bar.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
