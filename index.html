<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial, sans-serif;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:#0b0b0b;
z-index:1000;
box-sizing:border-box;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:14px;
}

.icon{
font-size:20px;
cursor:pointer;
}

/* SUBTOPICS */
.subnav{
margin-top:70px;
display:flex;
gap:20px;
padding:12px 20px;
overflow-x:auto;
white-space:nowrap;
scrollbar-width:none;
}

.subnav::-webkit-scrollbar{
display:none;
}

.subnav a{
color:white;
text-decoration:none;
font-size:12px;
opacity:0.7;
letter-spacing:1px;
}

/* PRESS IMAGE */
.press{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.press img{
width:100%;
border-radius:6px;
}

.press p{
margin-top:10px;
font-size:13px;
opacity:0.85;
line-height:1.5;
}

/* CTA */
.cta{
max-width:900px;
margin:20px auto 60px;
padding:0 20px;
}

.cta a{
color:white;
text-decoration:none;
font-family:Georgia, serif;
font-size:22px;
}

/* MENU OVERLAY */
.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
margin:10px;
letter-spacing:2px;
}
</style>
</head>

<body>

<header>
<div class="icon" onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>
<div class="icon">🔍</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
<a href="#">FILM</a>
<a href="#">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">EVENTS</a>
<br><br>
<a href="#" onclick="closeMenu()">CLOSE</a>
</div>

<!-- SUBTOPICS -->
<div class="subnav">
<a href="#">FILM</a>
<a href="#">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">EVENTS</a>
</div>

<!-- PRESS TOUR IMAGE (HOMEPAGE ONLY) -->
<div class="press">
<img src="leviticus-cover.jpg" alt="Press Tour Photo">
<p>
Stacey Clausen and Joe Bird photographed during a press tour moment for Leviticus — a constructed image that begins to fracture under attention.
</p>
</div>

<!-- CONTINUE READING -->
<div class="cta">
<a href="leviticus.html">Continue Reading →</a>
</div>

<script>
function openMenu(){
document.getElementById("menu").style.display="flex";
}

function closeMenu(){
document.getElementById("menu").style.display="none";
}
</script>

</body>
</html>
