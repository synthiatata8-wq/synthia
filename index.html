<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
color:#f5f5f5;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
z-index:100;
}

.menu,.search{
font-size:18px;
cursor:pointer;
opacity:0.7;
transition:0.3s;
}

.menu:hover,.search:hover{
opacity:1;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:6px;
font-size:14px;
}

/* HERO */
.hero{
height:100vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
align-items:flex-end;
padding:40px;
}

/* INTRO TEXT */
.intro{
max-width:400px;
font-size:14px;
line-height:1.6;
opacity:0.85;
}

/* MENU OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:200;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.overlay a{
color:#fff;
text-decoration:none;
font-size:20px;
margin:15px 0;
letter-spacing:3px;
}

/* CLOSE BUTTON */
.close{
position:absolute;
top:20px;
right:30px;
font-size:20px;
cursor:pointer;
}

/* SEARCH BAR */
.search-bar{
position:fixed;
top:70px;
right:30px;
background:#111;
padding:10px;
border-radius:6px;
display:none;
}

.search-bar input{
background:none;
border:none;
outline:none;
color:#fff;
font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="menu" onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>
<div class="search" onclick="toggleSearch()">⌕</div>
</header>

<!-- HERO -->
<div class="hero">
<div class="intro">
A creative studio exploring film, fashion, and culture through visual storytelling and contemporary narratives.
</div>
</div>

<!-- MENU -->
<div class="overlay" id="menu">
<div class="close" onclick="closeMenu()">✕</div>
<a href="film.html">FILM</a>
<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">TEAM</a>
</div>

<!-- SEARCH -->
<div class="search-bar" id="searchBar">
<input type="text" placeholder="Search...">
</div>

<script>
function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

function toggleSearch(){
var bar = document.getElementById("searchBar");
if(bar.style.display === "block"){
bar.style.display = "none";
}else{
bar.style.display = "block";
}
}
</script>

</body>
</html>
