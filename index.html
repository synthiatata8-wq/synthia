<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      letter-spacing: 2px;
    }

    /* HERO (ELLE STYLE) */
    .hero {
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10%;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 8px;
      margin: 0;
    }

    .hero p {
      opacity: 0.7;
      margin-top: 10px;
      max-width: 400px;
    }

    .hero a {
      margin-top: 20px;
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    /* GRID SECTION (MAGAZINE STYLE) */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      padding: 80px 10%;
    }

    .grid h2 {
      font-weight: 300;
      margin-bottom: 10px;
    }

    .grid p {
      opacity: 0.7;
      line-height: 1.5;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      header {
        padding: 20px;
      }
    }

    /* subtle cinematic background glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 60%),
                  radial-gradient(circle at bottom, rgba(232,66,122,0.08), transparent 60%);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <header>
    <div>SYNTHIA</div>
    <div>☰</div>
  </header>

  <section class="hero">
    <h1>SYNTHIA</h1>
    <p>Film • Fashion • Aesthetic Archive</p>
    <a href="leviticus.html">Explore Leviticus →</a>
  </section>

  <section class="grid">
    <div>
      <h2>Editorial</h2>
      <p>Fashion-inspired visual storytelling and curated aesthetics.</p>
    </div>

    <div>
      <h2>Film Archive</h2>
      <p>Cinematic references, moods, and visual inspiration.</p>
    </div>

    <div>
      <h2>Visual Studies</h2>
      <p>Exploration of color, texture, and composition.</p>
    </div>
  </section>

</body>
</html>
