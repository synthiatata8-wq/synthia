<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    /* TOP BAR */
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
    }

    .logo {
      text-align: center;
      letter-spacing: 4px;
      font-weight: 300;
    }

    .menu {
      justify-self: start;
      font-size: 20px;
      cursor: pointer;
    }

    .search {
      justify-self: end;
      font-size: 18px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10%;
    }

    .hero p {
      opacity: 0.7;
      max-width: 400px;
      line-height: 1.5;
    }

    .hero a {
      margin-top: 20px;
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      padding: 80px 10%;
    }

    .grid h2 {
      font-weight: 300;
    }

    .grid p {
      opacity: 0.7;
      line-height: 1.5;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* subtle cinematic glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 60%),
                  radial-gradient(circle at bottom, rgba(232,66,122,0.08), transparent 60%);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- TOP NAV -->
  <header class="topbar">
    <div class="menu">☰</div>
    <div class="logo">SYNTHIA</div>
    <div class="search">⌕</div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p>Film • Fashion • Aesthetic Archive</p>
    <a href="leviticus.html">Explore Leviticus →</a>
  </section>

  <!-- GRID -->
  <section class="grid">
    <div>
      <h2>Editorial</h2>
      <p>Fashion-inspired visual storytelling.</p>
    </div>

    <div>
      <h2>Film Archive</h2>
      <p>Cinematic moods and visual references.</p>
    </div>

    <div>
      <h2>Visual Studies</h2>
      <p>Color, texture and composition exploration.</p>
    </div>
  </section>

</body>
</html>
