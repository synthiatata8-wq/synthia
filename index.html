<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Helvetica, Arial, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
border-bottom:1px solid #1f1f1f;
position:sticky;
top:0;
background:#0b0b0b;
z-index:1000;
}

.logo{
letter-spacing:6px;
font-size:13px;
}

.icon{
cursor:pointer;
font-size:16px;
}

/* SUBNAV */
.subnav{
display:flex;
gap:18px;
padding:14px 20px;
overflow-x:auto;
border-bottom:1px solid #1a1a1a;
}

.subnav a{
color:#fff;
text-decoration:none;
font-size:11px;
opacity:0.7;
}

/* HERO */
.hero{
padding:20px;
}

.hero img{
width:100%;
border-radius:4px;
}

.hero p{
font-family:Georgia, serif;
margin-top:12px;
line-height:1.6;
}

.hero a{
display:inline-block;
margin-top:10px;
color:#fff;
text-decoration:none;
font-size:12px;
opacity:0.8;
}

/* OVERLAY */
.overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0b0b0b;
z-index:2000;
padding:20px;
}

.close{
position:absolute;
top:15px;
right:15px;
font-size:20px;
cursor:pointer;
}

/* MENU */
.menu-links{
margin-top:80px;
display:flex;
flex-direction:column;
gap:16px;
}

.menu-links a{
color:#fff;
text-decoration:none;
font-size:12px;
letter-spacing:1px;
}

/* SEARCH */
.search-box{
margin-top:80px;
}

.search-box input{
width:100%;
padding:12px;
background:transparent;
border:1px solid #333;
color:#fff;
}

/* FOOTER */
footer{
padding:25px 20px;
border-top:1px solid #1a1a1a;
font-size:12px;
opacity:0.8;
}

footer a{
display:block;
color:#fff;
text-decoration:none;
margin-top:6px;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="icon" onclick="openMenu()">☰</div>
<div class="logo">SYNTHIA</div>
<div class="icon" onclick="openSearch()">⌕</div>
</header>

<!-- SUBNAV -->
<div class="subnav">

<a href="fashion.html">FASHION</a>
<a href="#">CULTURE</a>
<a href="#">EVENTS</a>
</div>

<!-- HERO -->

<p>Leviticus explores identity through cinematic fragmentation.</p>

</div>

<!-- FOOTER -->
<footer>

</footer>

<!-- MENU -->
<div id="menu" class="overlay">
<div class="close" onclick="closeMenu()">×</div>

<div class="menu-links">
<a href="#">Film</a>
<a href="fashion.html">Fashion</a>
<a href="#">Culture</a>
<a href="#">Events</a>
<a>Contact →</a>
</div>
</div>

<!-- SEARCH -->
<div id="search" class="overlay">
<div class="close" onclick="closeSearch()">×</div>

<div class="search-box">
<input type="text" placeholder="Search...">
</div>
</div>

<script>
function openMenu(){
document.getElementById("menu").style.display="block";
}
function closeMenu(){
document.getElementById("menu").style.display="none";
}
function openSearch(){
document.getElementById("search").style.display="block";
}
function closeSearch(){
document.getElementById("search").style.display="none";
}
</script>

</body>
</html>
