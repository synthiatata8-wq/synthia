<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHIA</title>

<style>
body{
margin:0;
background:#0a0a0a;
color:#f2f2f2;
font-family:Helvetica, Arial, sans-serif;
-webkit-font-smoothing:antialiased;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
position:relative;
border-bottom:1px solid #151515;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
letter-spacing:8px;
font-size:13px;
font-weight:300;
opacity:0.9;
}

.icon{
font-size:18px;
cursor:pointer;
opacity:0.8;
}

/* MENU */
.menu{
position:fixed;
top:0;
left:-100%;
width:75%;
height:100%;
background:#0a0a0a;
padding:40px 20px;
transition:0.4s;
z-index:999;
}

.menu.active{
left:0;
}

.menu a{
display:block;
margin:18px 0;
font-size:14px;
letter-spacing:1px;
color:#fff;
text-decoration:none;
opacity:0.9;
}

/* CLOSE */
.close{
margin-bottom:30px;
opacity:0.6;
cursor:pointer;
font-size:12px;
}

/* CONTACT ICONS SECTION */
.contact{
margin-top:40px;
font-size:12px;
line-height:2;
opacity:0.8;
}

.contact-title{
font-size:10px;
letter-spacing:2px;
opacity:0.5;
margin-bottom:10px;
text-transform:uppercase;
}

/* SEARCH */
.search-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.search-overlay input{
width:70%;
border:none;
border-bottom:1px solid #333;
background:none;
color:#fff
